<!DOCTYPE HTML>
<html>
    <head>
        <title>Notepad--</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body, html {
                margin: 0;
                padding: 0;
                overflow: hidden;
                width: 100%;
                height: 100%;
            }
            textarea {
                display: block;
                width: 100vw;
                height: 90vh;
                vertical-align: top;
            }
            button {
                width: 40vw;
                margin: 1vh 5vw 1vh;
            }
            div {
                display: flex;
                height: 5vh;
            }
        </style>
    </head>
    <body>
        <div>
            <button id="import">Import</button>
            <button id="export">Export</button>
        </div>
        <textarea id="notepad" spellcheck="false"></textarea>
        <script>
            const importButton = document.getElementById("import")
            const exportButton = document.getElementById("export")
            const notepad = document.getElementById("notepad")
            function keyDetect(event) {
                if (event.key == "Tab") {
                    event.preventDefault()
                    notepad.setRangeText("    ", notepad.selectionStart, notepad.selectionEnd, "end")
                }
            }
            function importFile(event) {
                function readFile(fileEvent) {
                    const chosenFile = fileEvent.target.files[0]
                    if (chosenFile) {
                        const fileReader = new FileReader()
                        fileReader.onload = function(text) {
                            notepad.value = text.target.result.replace(/\r/g, "")
                        }
                        fileReader.readAsText(chosenFile)
                    }
                }
                const filePicker = document.createElement("input")
                filePicker.type = "file"
                filePicker.addEventListener("change", readFile)
                filePicker.click()
            }
            async function exportFile(event) {
                try {
                    let prompt
                    while (!prompt) {
                        prompt = window.prompt("Enter the name of the file.")
                    }
                    const blob = new Blob([notepad.value], { type: "text/plain" });
                    const downloadLink = document.createElement("a");
                    downloadLink.download = prompt;
                    downloadLink.href = window.URL.createObjectURL(blob);
                    downloadLink.click();
                    window.URL.revokeObjectURL(downloadLink.href);
                }
                catch (error) {}
            }
            notepad.addEventListener("keydown", keyDetect)
            importButton.addEventListener("click", importFile)
            exportButton.addEventListener("click", exportFile)
        </script>
    </body>
</html>
